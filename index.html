<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easter Egg Challenge</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./script.js" defer></script>
  </head>
  <body>
    <div class="content-container">
      <h1>Easter Egg Challenge</h1>

      <div id="game-frame" class="game-frame">
        <!-- spawn during game -->
        <button class="egg choco"></button>
        <button class="egg gold"></button>
        <button class="egg poisoned"></button>
      </div>
      <div id="hud" class="HUD-container">
        <div class="controls">
          <button id="btn-stop" class="stop custom-btn">Start/Stop</button>
          <button id="btn-reset" class="reset custom-btn">Reset</button>
          <select name="difficulties" id="diff-select">
            <option value="easy">Petit poussin (facile)</option>
            <option value="medium">Lapin malin (intermédiaire)</option>
            <option value="hard">Chasseur d’œufs (difficile)</option>
          </select>
        </div>
        <div class="display-container">
          <label for="timer">Temps restant</label>
          <input id="timer" name="timer" class="timer" type="text" value="00:00" readonly></input>
          <label for="score">Score</label>
          <input id="score" name="score" class="score" type="number" value="0" readonly>000</input>
        </div>
      </div>
    </div>
  </body>
</html>
