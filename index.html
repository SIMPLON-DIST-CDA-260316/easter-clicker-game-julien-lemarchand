<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easter Egg Challenge</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./script.js" defer></script>
  </head>
  <body>
    <div class="content_container">
        <h1>Easter Egg Challenge</h1>
        <div class="HUD">
            <div class="controls">
                <button class="start_pause custom-btn">Start</button>
                <button class="reset custom-btn">Reset</button>
            </div>
            <div class="display">
                <div class="timer">00:00</div>
                <div class="counter">000</div>
            </div>
        </div>
        <div class="game_frame">
             <button class="egg choco"></button>
             <button class="egg gold"></button>
        </div>
    </div>
  </body>
</html>
