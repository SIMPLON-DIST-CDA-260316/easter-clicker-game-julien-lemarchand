<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easter Egg Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Patrick+Hand+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
  <script type="module" src="./script.js" defer></script>
</head>

<body >
  <div id="game" class="game-container">
    <div class="game-container">
      <div id="game-frame" class="game-frame">
        <span id="timer" class="timer"></span>
        <div id="game-over" class="game-over" style="display:none">
          <h2 class="game-over-title">Game Over</h2>
          <p id="final-score" class="final-score"></p>
          <button id="btn-replay" class="btn pill">Play Again</button>
        </div>
      </div>
      <div id="hud" class="HUD-container">
        <div class="controls">
          <button id="btn-stop" class="stop-btn btn pill">Reset</button>
          <button id="btn-start" class="start pill btn">Start</button>

          <div>
            <div class="choco-counter"></div>
            <div class="gold-counter"></div>
            <div class="bad-counter"></div>
            <div class="chicken-counter"></div>
          </div>
        </div>
        <span id="score" class="score btn pill">Score: 0</span>
      </div>
    </div>


    <div id="game-menu" class="game-menu">
      <img class="game-title" src="./public/title-banner.png" alt="Easter Egg Hunter Game">
      <!-- <select name="" id="diff-select">
        <option value="easy">Little chick (easy)</option>
        <option value="medium">Sneaky bunny (medium)</option>
        <option value="hard">Egg hunter (hard)</option>
      </select> -->
      <!-- https://codepen.io/Maseone/pen/vEYzKay -->

      <div class="diff-container">
        <input class="btn pill" type="radio" value="easy" name="difficulty" checked />
        <input class="btn pill" type="radio" value="medium" name="difficulty" />
        <input class="btn pill" type="radio" value="hard" name="difficulty" />
      </div>

    </div>
  </div>
  </div>

  </div>
</body>


<template id="egg-template">
  <button name="" class="game-item egg"></button>
</template>

</html>
